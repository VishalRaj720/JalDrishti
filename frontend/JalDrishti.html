<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

  "showPlumes": true,

}/*EDITMODE-END*/;

// ── Error Boundary ────────────────────────────────────────────
// Catches any render crash in the tree and shows a readable error
// instead of a blank white screen.
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    console.error('[JalDrishti ErrorBoundary]', error, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 40, fontFamily: 'monospace', background: '#fff', minHeight: '100vh' }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: '#b91c1c', marginBottom: 12 }}>
            Render Error — check the browser console for details
          </div>
          <pre style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 8, padding: 16, fontSize: 13, color: '#b91c1c', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
            {this.state.error?.message}
            {'\n\n'}
            {this.state.error?.stack}
          </pre>
          <button onClick={() => this.setState({ error: null })}
            style={{ marginTop: 16, padding: '8px 20px', background: '#0D7377', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 14 }}>
            Retry
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// here guarantees the names are in local scope so JSX references

  RiskBadge       = () => null,
  StatusChip      = () => null,
  TypeBadge       = () => null,
  ProvenanceDot   = () => null,
  Skeleton        = () => null,
  StatCard        = () => null,
  SectionHeader   = () => null,
  Btn             = () => null,
  Tabs            = () => null,
  Input           = () => null,
  Select          = () => null,
  Modal           = () => null,
  Drawer          = () => null,

  DistrictDrawer        = () => null,
  BlockDrawer           = () => null,

  ISRDrawer             = () => null,

  MonitoringStationPage = () => null,

  DataIngestionPage     = () => null,

  return (
    <svg width={size} height={size} viewBox="0 0 34 34" fill="none" className="jd-logo-icon">
      <circle cx="17" cy="17" r="16" fill={color} opacity=".12" />
      <path d="M17 4 C17 4 8 14 8 20 C8 25.5 12 30 17 30 C22 30 26 25.5 26 20 C26 14 17 4 17 4Z" fill={color} />
      <ellipse cx="13" cy="21" rx="2.5" ry="3.5" fill="rgba(255,255,255,.35)" transform="rotate(-20 13 21)" />
    </svg>
  );
}

    ANALYST: { bg: '#eff6ff', color: '#1d4ed8' },
    VIEWER:  { bg: '#f0fdf4', color: '#15803d' },
  };
  const rc = roleColors[userRole];
  const navItems = [
    { id: 'map',       label: 'Map' },
    { id: 'dashboard', label: 'Analytics' },
    { id: 'ingest',    label: 'Data Ingest', roleReq: ['ADMIN','ANALYST'] },
    { id: 'users',     label: 'Users', roleReq: ['ADMIN'] },
  ].filter(n => !n.roleReq || n.roleReq.includes(userRole));

  return (
    <div className="jd-header">
      <div className="jd-logo" style={{ marginRight: 16 }}>
        <WaterDropLogo />
        <div>
          <div className="jd-logo-text">JalDrishti</div>
          <div className="jd-logo-sub">Groundwater Assessment</div>
        </div>
      </div>
      <nav className="jd-nav">
        {navItems.map(n => (
          <button key={n.id} className={`jd-nav-btn${screen === n.id ? ' active' : ''}`}
            onClick={() => setScreen(n.id)}>{n.label}</button>
        ))}
      </nav>
      <div className="jd-right">
        <span className="jd-role-badge" style={{ background: rc.bg, color: rc.color }}>{userRole}</span>
        <div style={{ position: 'relative' }}>
          <div className="jd-avatar" style={{ background: '#0D7377' }}
            onClick={() => setMenuOpen(v => !v)}>
            {userRole[0]}
          </div>
          {menuOpen && (
            <div className="jd-avatar-menu">
              <div style={{ padding: '8px 12px 6px', borderBottom: '1px solid #f1f5f9', marginBottom: 4 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: '#1e293b' }}>{currentUser?.username ?? 'admin'}</div>
                <div style={{ fontSize: 11, color: '#64748B' }}>{currentUser?.email ?? 'admin@jaldrishti.local'}</div>
              </div>
              <div style={{ padding: '4px', borderBottom: '1px solid #f1f5f9', marginBottom: 4 }}>

                    onClick={() => { onRoleChange(r); setMenuOpen(false); }}>
                    {r === userRole && <span style={{ fontSize: 12 }}>✓</span>}
                    {r}

                ))}

              <div className="jd-avatar-menu-item" onClick={onSignOut} style={{ color: '#DC2626' }}>Sign Out</div>
            </div>

  );
}

// ── Left Panel ────────────────────────────────────────────────
function LeftPanel({ layers, setLayers, onDistrictClick, onAquiferClick, onISRClick, onStationClick, userRole }) {
  const [search, setSearch] = React.useState('');
  const layerDefs = [
    { key: 'districts', label: 'Districts',   color: '#0D7377', icon: '⬡' },
    { key: 'blocks',    label: 'Blocks',       color: '#64748B', icon: '▦' },
    { key: 'aquifers',  label: 'Aquifers',     color: '#3B82F6', icon: '◎' },
    { key: 'isrPoints', label: 'ISR Points',   color: '#F59E0B', icon: '◆' },
    { key: 'plumes',    label: 'Plumes',       color: '#f97316', icon: '◉' },
    { key: 'stations',  label: 'Stations',     color: '#0D7377', icon: '●' },
    { key: 'wells',     label: 'Wells',        color: '#8b5cf6', icon: '◆' },
  ];

  const filtered = search
    ? window.DISTRICTS.filter(d => d.name.toLowerCase().includes(search.toLowerCase()))
    : window.DISTRICTS;

  return (
    <div className="jd-panel" style={{ position: 'relative' }}>
      {/* Search */}
      <div className="jd-panel-search">
        <input className="jd-search-input" placeholder="Search districts, blocks, aquifers…"

          <div key={l.key} className="jd-layer-row" onClick={() => setLayers(lrs => ({ ...lrs, [l.key]: !lrs[l.key] }))}>
            <div className="jd-layer-toggle" style={{ background: layers[l.key] ? l.color : '#E2E8F0' }}>
              <div className="jd-layer-toggle-thumb" style={{ left: layers[l.key] ? '14px' : '2px' }} />
            </div>
            <span style={{ fontSize: 12, color: layers[l.key] ? l.color : '#94a3b8', fontWeight: 500, width: 18, textAlign: 'center' }}>{l.icon}</span>
            <span style={{ fontSize: 13, color: '#1e293b', flex: 1 }}>{l.label}</span>
          </div>
        ))}
      </div>

      {/* Entity list */}
      <div className="jd-panel-list">
        {layers.districts && (
          <div>
            <div style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>Districts</div>

              <div key={d.id} className="jd-entity-row" onClick={() => onDistrictClick(d)}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500, color: '#1e293b' }}>{d.name}</div>
                  <div style={{ fontSize: 11, color: '#64748B', marginTop: 1 }}>{d.blocks} blocks · {d.aquifers} aquifers</div>
                </div>
                <RiskBadge level={d.risk} />
              </div>
            ))}
          </div>
        )}
        {layers.aquifers && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>Aquifers</div>
            {window.AQUIFERS.filter(a => !search || a.name.toLowerCase().includes(search.toLowerCase())).map(aq => (
              <div key={aq.id} className="jd-entity-row" onClick={() => onAquiferClick(aq)}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 500, color: '#1e293b' }}>{aq.name}</div>
                  <div style={{ fontSize: 11, color: '#64748B', marginTop: 1 }}>{aq.type} · {aq.minDepth}–{aq.maxDepth}m</div>
                </div>
                <RiskBadge level={aq.risk} />
              </div>
            ))}
          </div>
        )}
        {layers.isrPoints && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>ISR Points</div>
            {window.ISR_POINTS.filter(p => !search || p.name.toLowerCase().includes(search.toLowerCase())).map(p => (
              <div key={p.id} className="jd-entity-row" onClick={() => onISRClick(p)}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 500, color: '#1e293b' }}>{p.name}</div>
                  <div style={{ fontSize: 11, color: '#64748B', marginTop: 1, fontFamily: 'Roboto Mono, monospace' }}>{p.lat.toFixed(4)}°N</div>
                </div>
                <span style={{ fontSize: 11, color: p.endDate ? '#64748B' : '#16A34A', fontWeight: 600 }}>{p.endDate ? 'CLOSED' : 'ACTIVE'}</span>

            ))}

        )}
        {layers.stations && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 10, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>Monitoring Stations</div>
            {window.MONITORING_STATIONS.map(st => (
              <div key={st.id} className="jd-entity-row" onClick={() => onStationClick(st)}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 500, color: '#1e293b' }}>{st.name}</div>
                  <div style={{ fontSize: 11, color: '#64748B', marginTop: 1 }}>{st.village}</div>
                </div>
                <span style={{ fontSize: 13, fontWeight: 700, color: st.level > 15 ? '#DC2626' : st.level > 10 ? '#F59E0B' : '#16A34A' }}>{st.level} mbgl</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* FAB */}
      {userRole !== 'VIEWER' && (
        <button className="jd-fab" title="Add new entity">+</button>
      )}
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = React.useState('admin@jaldrishti.local');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  async function handleLogin(e) {
    e.preventDefault();
    if (!email)    { setError('Email is required.');    return; }
    if (!password) { setError('Password is required.'); return; }
    setLoading(true);
    setError('');
    try {
      // Try real backend first
      const data = await window.apiLogin(email, password);
      const role = (data.user?.role ?? 'viewer').toUpperCase();
      onLogin(role, data.user);
    } catch (apiErr) {
      // Fallback: accept seeded demo credentials without backend
      const DEMO = {
        'admin@jaldrishti.local':   { password: 'admin123',   role: 'ADMIN'   },
        'analyst@jaldrishti.local': { password: 'analyst123', role: 'ANALYST' },
        'viewer@jaldrishti.local':  { password: 'viewer123',  role: 'VIEWER'  },
        // legacy
        'admin@jaldrishti.gov.in':  { password: 'admin123',   role: 'ADMIN'   },
      };
      const demo = DEMO[email.toLowerCase()];
      if (demo && demo.password === password) {
        onLogin(demo.role, { username: email.split('@')[0], email, role: demo.role.toLowerCase() });
      } else {
        setError(apiErr.message || 'Invalid credentials. Try admin@jaldrishti.local / admin123');
      }
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="login-bg">
      <div className="login-card">
        <div className="login-logo">
          <WaterDropLogo size={42} />
          <div>
            <div style={{ fontSize: 22, fontWeight: 800, color: '#0D7377', letterSpacing: '-.03em' }}>JalDrishti</div>
          </div>
        </div>
        <div className="login-tagline">
          Groundwater Contamination Assessment Platform<br />
          <span style={{ color: '#94a3b8', fontSize: 11 }}>Government of Jharkhand · CGWB Collaboration</span>
        </div>
        {error && (
          <div style={{ background: '#fee2e2', border: '1px solid #fecaca', borderRadius: 8, padding: '8px 12px', fontSize: 13, color: '#b91c1c', marginBottom: 12 }}>{error}</div>
        )}
        <form onSubmit={handleLogin}>
          <div className="login-field">
            <label className="login-label">Email Address</label>
            <input className="login-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="user@jaldrishti.gov.in" autoFocus />
          </div>
          <div className="login-field">
            <label className="login-label">Password</label>
            <input className="login-input" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
          </div>
          <button type="submit" disabled={loading} style={{
            width: '100%', height: 44, background: loading ? '#64748B' : '#0D7377', color: '#fff',
            border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: loading ? 'not-allowed' : 'pointer',
            marginTop: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            fontFamily: 'var(--font-sans)', transition: 'background .2s',
          }}>
            {loading ? (
              <><span style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,.4)', borderTopColor: '#fff', borderRadius: '50%', display: 'inline-block', animation: 'spin .8s linear infinite' }} /> Signing in…</>
            ) : 'Sign In'}
          </button>
        </form>
        <div style={{ textAlign: 'center', marginTop: 16, fontSize: 13, color: '#94a3b8' }}>
          Need access? <span style={{ color: '#0D7377', cursor: 'pointer', fontWeight: 500 }}>Contact your administrator</span>
        </div>
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: '1px solid #f1f5f9', display: 'flex', justifyContent: 'center', gap: 16, fontSize: 11, color: '#94a3b8' }}>
          <span>Ministry of Jal Shakti</span><span>·</span><span>CPCB</span><span>·</span><span>CGWB</span>
        </div>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [loggedIn,   setLoggedIn]   = React.useState(false);
  const [currentUser,setCurrentUser]= React.useState(null);
  const [screen,     setScreen]     = React.useState('map');
  const [userRole,   setUserRole]   = React.useState('ADMIN');
  const [layers,     setLayers]     = React.useState({
    districts: true, blocks: false, aquifers: true,
    isrPoints: true, plumes: tweaks?.showPlumes ?? true,
    stations: true, wells: true,
  });

  // Drawer / overlay state
  const [drawer,    setDrawer]    = React.useState(null);  // { type, data }
  const [subScreen, setSubScreen] = React.useState(null);  // { type, data }
  const [simModal,  setSimModal]  = React.useState(null);  // isr point

  // Sync tweaks → state
  React.useEffect(() => { setUserRole(tweaks.userRole); }, [tweaks.userRole]);
  React.useEffect(() => { setLayers(l => ({ ...l, plumes: tweaks.showPlumes })); }, [tweaks.showPlumes]);

  function handleLogin(role, user) {
    setLoggedIn(true);
    setCurrentUser(user);
    setUserRole(role);
  }

  function handleSignOut() {
    window.apiLogout?.();
    setLoggedIn(false);
    setCurrentUser(null);
  }

  function openDistrictDrawer(d)  { setDrawer({ type: 'district', data: d }); setSubScreen(null); }
  function openBlockDrawer(b)     { setDrawer({ type: 'block',    data: b }); setSubScreen(null); }
  function openAquiferDrawer(aq)  { setDrawer({ type: 'aquifer',  data: aq }); setSubScreen(null); }
  function openISRDrawer(isr)     { setDrawer({ type: 'isr',      data: isr }); setSubScreen(null); }
  function openStationPage(st)    { setSubScreen({ type: 'station', data: st }); setDrawer(null); }
  function openWQPage(w)          { setSubScreen({ type: 'wq',      data: w }); setDrawer(null); }
  function closeDrawer()          { setDrawer(null); }
  function closeSubScreen()       { setSubScreen(null); }

  if (!loggedIn) return <LoginPage onLogin={handleLogin} />;

  const isMapScreen = screen === 'map';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', fontFamily: 'Inter, sans-serif' }}>
      <Header
        screen={screen} setScreen={s => { setScreen(s); setDrawer(null); setSubScreen(null); }}
        userRole={userRole}
        currentUser={currentUser}
        onSignOut={handleSignOut}
        onRoleChange={r => { setUserRole(r); setTweak('userRole', r); }}
      />

      <div className="jd-main">
        {/* Left panel: map screen only */}
        {isMapScreen && !subScreen && (
          <LeftPanel
            layers={layers} setLayers={setLayers}
            onDistrictClick={openDistrictDrawer}
            onAquiferClick={openAquiferDrawer}
            onISRClick={openISRDrawer}
            onStationClick={openStationPage}
            userRole={userRole}
          />
        )}

        {/* Content area */}
        <div className="jd-content">
          {/* Sub-screen: full page overlays */}
          {subScreen?.type === 'station' && (
            <MonitoringStationPage station={subScreen.data} onBack={closeSubScreen} userRole={userRole} />
          )}
          {subScreen?.type === 'wq' && (
            <WaterQualityPage well={subScreen.data} onBack={closeSubScreen} />
          )}

          {/* Map screen */}
          {isMapScreen && !subScreen && (
            <MapDashboard
              layers={layers} setLayers={setLayers}
              onDistrictClick={openDistrictDrawer}
              onAquiferClick={openAquiferDrawer}
              onISRClick={openISRDrawer}
              onStationClick={openStationPage}
              onWellClick={openWQPage}
              activeDrawer={drawer ? { type: drawer.type, id: drawer.data?.id } : null}
            />
          )}

          {/* Full-page screens */}
          {screen === 'dashboard' && <AnalyticsDashboard />}
          {screen === 'ingest'    && <DataIngestionPage />}
          {screen === 'users'     && <UserManagementPage />}
        </div>

        {/* Right drawers */}
        {drawer?.type === 'district' && (
          <DistrictDrawer
            district={drawer.data} onClose={closeDrawer}
            onBlockClick={openBlockDrawer}
            onRunSimulation={() => setSimModal(window.ISR_POINTS[0])}
            userRole={userRole}
          />
        )}
        {drawer?.type === 'block' && (
          <BlockDrawer
            block={drawer.data} onClose={closeDrawer}
            onStationClick={openStationPage}
            onWaterQualityClick={openWQPage}
            userRole={userRole}
          />
        )}
        {drawer?.type === 'aquifer' && (
          <AquiferDrawer
            aquifer={drawer.data} onClose={closeDrawer}
            onRunSimulation={() => setSimModal(window.ISR_POINTS[0])}
            userRole={userRole}
          />
        )}
        {drawer?.type === 'isr' && (
          <ISRDrawer
            isrPoint={drawer.data} onClose={closeDrawer}
            onRunSimulation={() => setSimModal(drawer.data)}
            userRole={userRole}
          />
        )}
      </div>

      {/* Simulation modal */}
      {simModal && (
        <SimulationModal
          isrPoint={simModal}
          onClose={() => setSimModal(null)}
          onComplete={() => console.log('Simulation complete')}
        />
      )}

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection title="User & Access">
          <TweakSelect
            label="User Role"
            value={tweaks.userRole}
            options={['ADMIN','ANALYST','VIEWER']}
            onChange={v => setTweak('userRole', v)}
          />
        </TweakSection>
        <TweakSection title="Map Settings">
          <TweakToggle
            label="Show Contamination Plumes"
            value={tweaks.showPlumes}
            onChange={v => setTweak('showPlumes', v)}
          />
          <TweakSelect
            label="Default Screen"
            value={tweaks.defaultScreen}
            options={['map','dashboard','ingest','users']}
            onChange={v => setTweak('defaultScreen', v)}
          />
        </TweakSection>
        <TweakSection title="Quick Actions">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <button onClick={() => { setScreen('map'); setDrawer({ type: 'district', data: window.DISTRICTS[0] }); }}
              style={{ padding: '7px 12px', background: '#edf9fa', color: '#0D7377', border: '1px solid #a7dfe1', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer', textAlign: 'left' }}>
              → Open Giridih District
            </button>
            <button onClick={() => { setScreen('map'); setDrawer({ type: 'isr', data: window.ISR_POINTS[0] }); }}
              style={{ padding: '7px 12px', background: '#fffbeb', color: '#b45309', border: '1px solid #fde68a', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer', textAlign: 'left' }}>
              → Open ISR-Jadugoda-01
            </button>
            <button onClick={() => setSimModal(window.ISR_POINTS[0])}
              style={{ padding: '7px 12px', background: '#f0fdf4', color: '#16A34A', border: '1px solid #bbf7d0', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer', textAlign: 'left' }}>
              → Open Simulation Modal
            </button>
            <button onClick={() => openStationPage(window.MONITORING_STATIONS[0])}
              style={{ padding: '7px 12px', background: '#eff6ff', color: '#1d4ed8', border: '1px solid #bfdbfe', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer', textAlign: 'left' }}>
              → Open Monitoring Station
            </button>
            <button onClick={() => openWQPage(window.WELLS[1])}
              style={{ padding: '7px 12px', background: '#fef2f2', color: '#b91c1c', border: '1px solid #fecaca', borderRadius: 6, fontSize: 12, fontWeight: 500, cursor: 'pointer', textAlign: 'left' }}>
              → Open Water Quality (Critical)
            </button>
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary>
    <App />
  </ErrorBoundary>
);
</script>
