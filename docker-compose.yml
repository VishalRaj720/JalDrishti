services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: jaldrishti_db
    environment:
      POSTGRES_DB: groundwater_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "040812"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d groundwater_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  # Celery/Redis and the never-built ml-service were removed in the
  # Month-1 slim-down. Simulations run as in-process background tasks.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jaldrishti_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:040812@db:5432/groundwater_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
